# Next.js SSR / App Router — Netlify Essentials
# Repo yapısı: Next uygulaması `web/` altında olduğu için base burada.

[build]
  base = "web"
  command = "npm run build"
  # Varsayılan "publish = base" OpenNext için hata verir; base ile aynı dizin olamaz.
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
